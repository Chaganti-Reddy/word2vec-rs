name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

# ─────────────────────────────────────────────────────────────
# Job 1 — fmt · clippy · all tests (unit + integration + doc)
# ─────────────────────────────────────────────────────────────
jobs:
  check:
    name: Check (fmt · clippy · test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable + tools)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install system libs (needed by plotters/font-kit)
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings

      - name: Unit + integration + doc tests
        run: cargo test --all

  # ─────────────────────────────────────────────────────────────
  # Job 2 — benchmarks + rustdoc → GitHub Pages
  # Only runs on pushes to main (not PRs)
  # ─────────────────────────────────────────────────────────────
  docs-and-bench:
    name: Docs + Benchmarks
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install system libs
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev

      - name: Build rustdoc
        run: cargo doc --no-deps --all-features

      - name: Run training example (generates plots + artifacts)
        run: cargo run --release --example basic_training

      - name: Assemble site
        run: |
          mkdir -p site
          # rustdoc
          cp -r target/doc/. site/
          # generated plots and artifacts
          mkdir -p site/artifacts
          cp loss_curve.png   site/artifacts/
          cp word_pca.png     site/artifacts/
          cp embeddings.txt   site/artifacts/
          cp training_history.json site/artifacts/
          # landing page
          cat > site/index.html << 'HTML'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <title>word2vec — Rust</title>
            <style>
              body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
              img  { max-width: 100%; border: 1px solid #ddd; border-radius: 6px; margin: 10px 0; }
              a    { color: #0366d6; }
            </style>
          </head>
          <body>
            <h1>word2vec — Production Rust Implementation</h1>
            <p>Skip-gram &amp; CBOW with Negative Sampling.</p>
            <ul>
              <li><a href="word2vec/index.html">📖 API Docs (rustdoc)</a></li>
              <li><a href="artifacts/embeddings.txt">⬇ embeddings.txt (word2vec text format)</a></li>
              <li><a href="artifacts/training_history.json">⬇ training_history.json</a></li>
            </ul>
            <h2>Training Loss</h2>
            <img src="artifacts/loss_curve.png" alt="Loss curve">
            <h2>Word Vectors (PCA)</h2>
            <img src="artifacts/word_pca.png" alt="PCA projection">
          </body>
          </html>
          HTML

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  # ─────────────────────────────────────────────────────────────
  # Job 3 — deploy to GitHub Pages
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    if: github.ref == 'refs/heads/main'
    needs: docs-and-bench
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4