name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  check:
    name: Check (fmt · clippy · test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable + tools)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install system libs (needed by plotters/font-kit)
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings

      - name: Unit + integration + doc tests
        run: cargo test --all

  docs-and-bench:
    name: Docs + Benchmarks
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install system libs
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev

      - name: Build rustdoc
        run: cargo doc --no-deps --all-features

      - name: Run training example (generates plots + artifacts)
        run: cargo run --release --example basic_training

      - name: Assemble site
        run: |
          mkdir -p site
          # rustdoc
          cp -r target/doc/. site/
          # generated plots and artifacts
          mkdir -p site/artifacts
          cp loss_curve.png   site/artifacts/
          cp word_pca.png     site/artifacts/
          cp embeddings.txt   site/artifacts/
          cp training_history.json site/artifacts/
          cp index.html site/index.html

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    if: github.ref == 'refs/heads/main'
    needs: docs-and-bench
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4